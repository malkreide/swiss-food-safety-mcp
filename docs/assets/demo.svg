<svg xmlns="http://www.w3.org/2000/svg" width="640" height="355" viewBox="0 0 640 355">
  <rect width="640" height="355" fill="#0d1117"/>

  <!-- Divider lines -->
  <rect x="0" y="100" width="640" height="1" fill="#30363d"/>
  <rect x="0" y="225" width="640" height="1" fill="#30363d"/>

  <!-- Panel 1: User (y=0, h=100) -->
  <rect x="0" y="0" width="3" height="100" fill="#58a6ff"/>
  <rect x="3" y="0" width="637" height="100" fill="#161b22"/>
  <text x="16" y="20" font-family="monospace" font-size="13" fill="#58a6ff" font-weight="bold">&#x1F4AC; You</text>
  <text x="16" y="44" font-family="monospace" font-size="13" fill="#c9d1d9">Are there any current BLV food warnings relevant</text>
  <text x="16" y="62" font-family="monospace" font-size="13" fill="#c9d1d9">to school canteens, and which animal diseases are</text>
  <text x="16" y="80" font-family="monospace" font-size="13" fill="#c9d1d9">reported in Zurich canton?</text>

  <!-- Panel 2: Tool Calls (y=101, h=124) -->
  <rect x="0" y="101" width="3" height="124" fill="#e3b341"/>
  <rect x="3" y="101" width="637" height="124" fill="#161b22"/>
  <text x="16" y="121" font-family="monospace" font-size="13" fill="#e3b341" font-weight="bold">&#x1F527; Tool Calls</text>
  <text x="16" y="145" font-family="monospace" font-size="13" fill="#e3b341">blv_get_public_warnings(limit=10)</text>
  <text x="16" y="163" font-family="monospace" font-size="13" fill="#e3b341">blv_search_animal_diseases(</text>
  <text x="16" y="181" font-family="monospace" font-size="13" fill="#e3b341">    canton=&quot;ZH&quot;, year=2026</text>
  <text x="16" y="199" font-family="monospace" font-size="13" fill="#e3b341">)</text>

  <!-- Panel 3: Claude response (y=226, h=129) -->
  <rect x="0" y="226" width="3" height="129" fill="#3fb950"/>
  <rect x="3" y="226" width="637" height="129" fill="#161b22"/>
  <text x="16" y="246" font-family="monospace" font-size="13" fill="#3fb950" font-weight="bold">&#x1F916; Claude</text>
  <text x="16" y="270" font-family="monospace" font-size="13" fill="#c9d1d9">2 active warnings: Salmonella in raw sausage (recalled</text>
  <text x="16" y="288" font-family="monospace" font-size="13" fill="#c9d1d9">Jan 31) and pesticide residues in strawberries.</text>
  <text x="16" y="312" font-family="monospace" font-size="13" fill="#c9d1d9">ZH canton: 0 notifiable animal diseases in 2026.</text>
  <text x="16" y="336" font-family="monospace" font-size="13" fill="#c9d1d9">No current food safety risks for school canteens.</text>
</svg>
